parameters:
  - name: solution
    displayName: solution
    type: string
    default: "*/**.sln"

steps:
- task: DownloadSecureFile@1
  inputs:
    secureFile: '${{parameters.nuGetConfigName}}'
- task: PowerShell@2
  inputs:
    targetType: 'inline'
    script: |
      Copy-Item -Path $(${{ parameters.securefile }}.secureFilePath) -Destination ./NuGet.Config
  displayName: 'authentication'
- task: DotNetCoreCLI@2
  displayName: Restore NuGet packages with dotnet cli
  inputs:
    command: 'restore'
    projects: '${{parameters.solution}}'
    feedsToUse: 'config'
    nugetConfigPath: '${{parameters.nuGetConfigName}}'
    noCache: true