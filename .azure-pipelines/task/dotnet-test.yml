parameters:
  csprojList: ['Actors.Analyzer.FunctionalTests','Actors.Dapr.AspNetCore.IntegrationTests','Actors.Dapr.UnitTests','Actors.FunctionalTests','Actors.TestModel','Actors.UnitTests','Application.UnitTests','Common.Analyzer.FunctionalTests','Common.UnitTests','Dapr.AspNetCore.UnitTests','Data.AdoNet.FunctionalTests','Data.AdoNet.UnitTests',Data.EntityFrameworkCore.FunctionalTests','Data.EntityFrameworkCore.UnitTests','Data.IntegrationTests','Data.MongoDB.IntegrationTests','Data.MongoDB.UnitTests','Data.UnitTests','Infrastructure.Dapr.AspNetCore.UnitTests','Infrastructure.Dapr.UnitTests','Messaging.AspNetCore.UnitTests','Messaging.Dapr.AspNetCore.IntegrationTests','Messaging.Dapr.AspNetCore.UnitTests','Messaging.Dapr.UnitTests','Messaging.UnitTests','Shared.UnitTests'] # this array contain the list of csproj files to test

steps:
- ${{ each csproj in parameters.csprojList }}:
- task: DotNetCoreCLI@2
  inputs:
    command: test
    projects: '$(System.DefaultWorkingDirectory)/tests/${{csproj}}/${{variables.prefix}}.${{csproj}}.csproj)'
    arguments: '--configuration Release --no-build'