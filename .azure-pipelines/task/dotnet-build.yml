parameters:
  - name: solution
    displayName: solution
    type: string
    default: "*.sln"
  - name: buildPlatform
    displayName: buildPlatform
    type: string
    default: "Any CPU"
  - name: buildConfiguration
    displayName: buildConfiguration
    type: string
    default: "Release"

steps:
- task: PowerShell@2
  displayName: build ${{parameters.solution}}
  inputs:
    targetType: 'inline'
    script: 'dotnet build ${{parameters.solution}} --no-restore -c ${{parameters.buildConfiguration}}'
    