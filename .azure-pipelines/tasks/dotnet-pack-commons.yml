parameters:
- name: prefix
  type: string
- name: release
  type: string
- name: csprojList
  type: object
  default:
  - Actors
  - Actors.Dapr
  - Actors.Dapr.AspNetCore
  - Application
  - Common
  - Dapr.AspNetCore
  - Data
  - Data.AdoNet
  - Data.AdoNet.DependencyInjection
  - Data.AdoNet.MySQL
  - Data.AdoNet.Oracle
  - Data.AdoNet.PostgreSQL
  - Data.AdoNet.SQLServer
  - Data.AutoMapper
  - Data.EntityFrameworkCore
  - Data.EntityFrameworkCore.DependencyInjection
  - Data.EntityFrameworkCore.Shared
  - Data.EntityFrameworkCore5
  - Data.EntityFrameworkCore5.DependencyInjection
  - Data.MongoDB
  - Data.MongoDB.DependencyInjection
  - Emit
  - Extensions
  - Infrastructure
  - Infrastructure.Dapr
  - Infrastructure.Dapr.AspNetCore
  - Messaging
  - Messaging.AspNetCore
  - Messaging.Dapr
  - Messaging.Dapr.AspNetCore
  - PolicyManager
  - PolicyManager.DependencyInjection
  - Data.Mapster

steps:
- ${{ each csproj in parameters.csprojList }}:
  - task: Powershell@2
    displayName: dotnet pack ${{csproj}}
    inputs:
      workingDirectory: $(System.DefaultWorkingDirectory)/src
      targetType: inline
      script: |
        dotnet pack ${{ csproj }}/${{ parameters.prefix }}.${{ csproj }}.csproj -p:PackageVersion=$(Build.BuildNumber) --no-restore --output ../nupkgs
  - task: Powershell@2
    displayName: sign ${{csproj}}
    inputs:
      workingDirectory: $(System.DefaultWorkingDirectory)/nupkgs
      targetType: inline
      script: |
        $nupkg = "./${{parameters.prefix}}.${{ csproj }}.$(Build.BuildNumber).nupkg"
        $env:AZURE_CLIENT_ID = "$(AZURE_CLIENT_ID)" 
        $env:AZURE_TENANT_ID = "$(AZURE_TENANT_ID)" 
        $env:AZURE_CLIENT_SECRET = "$(AZURE_CLIENT_SECRET)"
        #sign code trusted-signing -tsa $(TSA) -tse $(TSE) -tscp $(TSCP) $nupkg
        #sign code artifact-signing --artifact-signing-endpoint $(TSE) --artifact-signing-account $(TSA) --artifact-signing-certificate-profile $(TSCP) --verbosity trace $nupkg        

        $maxRetries = 8
        $attempt = 0

        while ($attempt -lt $maxRetries) {
          $attempt++
          Write-Host "Tentativo $attempt di $maxRetries..."

            sign code artifact-signing --artifact-signing-endpoint $(TSE) --artifact-signing-account $(TSA) --artifact-signing-certificate-profile $(TSCP) --verbosity trace $nupkg
            
            if ($LASTEXITCODE -eq 0) { Write-Host "Firma completata con successo!"; break; }
            
            if ($attempt -lt $maxRetries) {
                $wait = 5 * $attempt
                Write-Warning "Firma fallita. Riprovo tra $wait secondi..."
                Start-Sleep -Seconds $wait
            } else {
                Write-Error "Firma fallita dopo $maxRetries tentativi."
                exit 1
            }
        }

        dotnet nuget verify $nupkg
  - task: Powershell@2
    displayName: dotnet push ${{ csproj }}
    inputs:
      workingDirectory: $(System.DefaultWorkingDirectory)/nupkgs
      targetType: inline
      script: |
        dotnet nuget push ./${{parameters.prefix}}.${{ csproj }}.$(Build.BuildNumber).nupkg -k $(TOKEN) -s $(SOURCE_NAME)