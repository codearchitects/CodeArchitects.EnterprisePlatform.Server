parameters:
- name: buildConfiguration
  type: string
  default: Release
- name: prefix
  type: string
- name: release
  type: string
- name: csprojList
  type: object
  default:
  - Actors.Analyzer.FunctionalTests
  - Actors.Dapr.AspNetCore.IntegrationTests
  - Actors.Dapr.UnitTests
  - Actors.FunctionalTests
  - Actors.TestModel
  - Actors.UnitTests
  - Application.UnitTests
  - Common.Analyzer.FunctionalTests
  - Common.UnitTests
  - Dapr.AspNetCore.UnitTests
  - Data.AdoNet.FunctionalTests
  - Data.AdoNet.UnitTests
  - Data.EntityFrameworkCore.FunctionalTests
  - Data.EntityFrameworkCore.UnitTests
  - Data.IntegrationTests
  - Data.MongoDB.IntegrationTests
  - Data.MongoDB.UnitTests
  - Data.UnitTests
  - Infrastructure.Dapr.AspNetCore.UnitTests
  - Infrastructure.Dapr.UnitTests
  - Messaging.AspNetCore.UnitTests
  - Messaging.Dapr.AspNetCore.IntegrationTests
  - Messaging.Dapr.AspNetCore.UnitTests
  - Messaging.Dapr.UnitTests
  - Messaging.UnitTests
  - Shared.UnitTests
  - PolicyManager.UnitTests
  - PolicyManager.IntegrationTests
- name: targetFrameworks
  type: object
  default:
  - net7.0
  - net8.0
  - net9.0

steps:
- ${{ each csproj in parameters.csprojList }}:
  - ${{ each targetFramework in parameters.targetFrameworks }}:
    - task: Powershell@2
      displayName: dotnet test ${{csproj}}
      inputs:
        workingDirectory: $(System.DefaultWorkingDirectory)/tests
        targetType: inline
        script: |
          dotnet test ./${{ csproj }}/${{ parameters.prefix }}.${{ csproj }}.csproj --framework ${{ targetFramework }} --configuration ${{ parameters.buildConfiguration }} --no-build --no-restore
