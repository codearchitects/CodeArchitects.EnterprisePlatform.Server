version: '3.4'

services:
  efcoresample:
    image: ${DOCKER_REGISTRY-}efcoresample
    build:
      context: .
      dockerfile: EFCoreSample/Dockerfile
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__SqlServer=Server=sqlserver;Database=Test;User Id=sa;Password=Password1;TrustServerCertificate=True;
    ports:
      - 5000:80

  sqlserver:
    image: mcr.microsoft.com/mssql/server:2019-latest
    environment:
      - SA_PASSWORD=Password1
      - ACCEPT_EULA=Y
