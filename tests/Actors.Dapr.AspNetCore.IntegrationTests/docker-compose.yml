services:
  actorapp:
    image: ${DOCKER_REGISTRY-}actorapp
    build:
      context: ../..
      dockerfile: tests/Actors.Dapr.AspNetCore.IntegrationTests/ActorApp/Dockerfile
      args:
        - TARGET_FRAMEWORK=${TARGET_FRAMEWORK}
        - LATEST_FRAMEWORK=${LATEST_FRAMEWORK}
        - HTTP_PORT=${HTTP_PORT}
    ports:
      - 20100:${HTTP_PORT}
      - 3500:3500
      - 50001:50001
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
    depends_on:
      - redis
      - rabbitmq

  actorapp-dapr:
    image: daprio/daprd:latest
    network_mode: service:actorapp
    restart: on-failure
    depends_on:
      actorapp:
        condition: service_started
      rabbitmq:
        condition: service_healthy
      dapr-scheduler:
        condition: service_started
    command: ["./daprd",
      "-app-id", "actorapp",
      "-app-port", "${HTTP_PORT}",
      "-placement-host-address", "dapr-placement:50000",
      "-scheduler-host-address", "dapr-scheduler:50006",
      "-components-path", "/components"
      ]
    volumes:
      - ./Dapr/components:/components
    
  redis:
    image: redis:alpine
    ports:
      - 5379:6379
    
  rabbitmq:
    image: rabbitmq:3-management-alpine
    ports:
      - 5672:5672
      - 15672:15672
    healthcheck:
      test: ["CMD-SHELL", "rabbitmq-diagnostics -q check_running && rabbitmq-diagnostics -q check_port_connectivity"]
      interval: 15s
      timeout: 5s
      retries: 5
      
  dapr-placement:
    image: "daprio/dapr:latest"
    command: ["./placement", "-port", "50000", "-log-level", "debug"]
    ports:
      - "50000:50000"
    
  dapr-scheduler:
    image: "daprio/dapr:latest"
    command: ["./scheduler", "--port", "50006", "--etcd-data-dir", "/tmp/data"]
    ports:
      - "50006:50006"
    tmpfs:
      - /tmp/data
