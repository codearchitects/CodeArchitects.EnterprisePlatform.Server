version: 2
updates:
  # NuGet dependencies across the solution
  - package-ecosystem: "nuget"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    groups:
      microsoft:
        patterns:
          - "Microsoft.*"
          - "System.*"
      test-tooling:
        patterns:
          - "xunit*"
          - "Moq"
          - "FluentAssertions"
          - "coverlet*"
          - "Testcontainers*"

  # GitHub Actions used in workflows
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
